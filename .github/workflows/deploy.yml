name: Deploy Standing Together Project

on:
  push:
    branches:
      - master

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------- Checkout ----------
      - name: Checkout code
        uses: actions/checkout@v3

      # ---------- Setup Node ----------
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20

      # ---------- Backend ----------
      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Run backend tests
        run: npm test
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      # ---------- Frontend ----------
      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      # ---------- Deploy files to VPS ----------
      - name: Deploy via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "."
          target: "/var/www/Standing-together-2"

      # ---------- Build backend and restart PM2 ----------
      - name: Build and restart app via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/Standing-together-2/backend

            # Install backend dependencies
            npm install --omit=dev

            # Rebuild TypeScript to make sure latest routes exist
            npm run build

            # Restart existing PM2 process or create it if missing
            pm2 restart standing-together || pm2 start dist/index.js --name standing-together

            # Save PM2 process list for server reboot
            pm2 save